<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">详情页</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <link rel="stylesheet" th:href="@{/css/typo.css}">
    <link rel="stylesheet" th:href="@{/css/me_define.css}">
    <!--引入editormd-->
    <link rel="stylesheet" th:href="@{/lib/editormd/css/editormd.min.css}">
    <!--引入animate动画-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <!--下面引入prism代码高亮库-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet">
    <!--下面引入tocbot目录工具-->
    <link rel="stylesheet" th:href="@{/lib/tocbot/tocbot.css}">

    <!-- 隐藏式导航栏样式（与前台 index 相同） -->
    <style>
        body {
    background-color: #e8e6e4;
}
        .corner-nav {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 2000;
        }
        .nav-trigger {
            width: 52px;
            height: 52px;
            background-color: #8fa0b8;
            border-radius: 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(148, 143, 140, 0.15);
        }
        .nav-trigger:hover {
            background-color: #677b8f;
            transform: scale(1.02);
        }
        .nav-trigger span {
            width: 24px;
            height: 2px;
            background-color: #fff;
            transition: all 0.3s ease;
        }
        .nav-trigger.open span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }
        .nav-trigger.open span:nth-child(2) {
            opacity: 0;
        }
        .nav-trigger.open span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }
        .nav-menu {
            position: fixed;
            top: 0;
            right: 0;
            width: 25%;
            height: 100vh;
            background-color: #ffffff;
            box-shadow: -4px 0 24px rgba(148, 143, 140, 0.15);
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 2001;
        }
        .nav-menu.open {
            transform: translateX(0);
        }
        .nav-menu ul {
            list-style: none;
            padding: 2rem 0;
        }
        .nav-menu li a {
            display: block;
            padding: 1rem 2rem;
            text-decoration: none;
            color: #404e5b;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.2s;
            border-bottom: 1px solid #948f8c;
            text-align: left;
        }
        .nav-menu li:first-child a {
            border-top: 1px solid #948f8c;
        }
        .nav-menu li a:hover {
            background-color: rgba(143, 160, 184, 0.15);
            color: #5a7d9a;
            padding-left: 2.5rem;
        }
        .nav-menu-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            background-color: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6c7c8c;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-menu-close:hover {
            color: #404e5b;
            transform: rotate(90deg);
        }
        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            z-index: 1999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .nav-overlay.open {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

<!-- ========= 隐藏式导航栏片段（替换原 menu 片段） ========= -->
<!-- 注意：原调用方式为 <nav th:replace="admin/_fragments :: menu(3)"></nav>，会将 nav 标签替换为以下内容 -->
<div th:fragment="menu(n)" style="display: block;">
    <div class="corner-nav">
        <div class="nav-trigger" id="navTrigger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    <div class="nav-menu" id="navMenu">
        <button class="nav-menu-close" id="navMenuClose">✕</button>
        <ul>
            <li><a href="/" th:href="@{/}">前台首页</a></li>
            <li><a href="/bobbin" th:href="@{/bobbin}">知识线轴</a></li>
            <li><a href="/admin/index" th:href="@{/admin/index}">后台首页</a></li>
            <!--因为分类数量固定了所以给删掉了<li><a href="/admin/types" th:href="@{/admin/types}">分类</a></li>-->
            <li><a href="/admin/blogs" th:href="@{/admin/blogs}">文章</a></li>
            <li><a href="/admin/logout" th:href="@{/admin/logout}">退出登录</a></li>
            <li><a href="/about" th:href="@{/about}">关于网站</a></li>

        </ul>
    </div>
    <div class="nav-overlay" id="navOverlay"></div>
</div>

<!--底部-->
<footer class="ui inverted vertical segment md-padded-tb-massive" th:fragment="footer">

</footer>

<th:block th:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6/dist/jquery.min.js"></script>
    <!--markdown-->
    <script th:src="@{/lib/editormd/editormd.min.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <!--下面引入tocbot目录工具-->
    <script th:src="@{/lib/tocbot/tocbot.min.js}"></script>
    <!--下面引入qrcode二维码生成-->
    <script th:src="@{/lib/qrcode/qrcode.min.js}"></script>
    <!--下面引入scrollto平滑滚动-->
    <script src="https://cdn.jsdelivr.net/npm/jquery.scrollto@2.1.3/jquery.scrollTo.min.js"></script>

    <!-- 导航交互脚本 -->
    <script>
        (function() {
            const trigger = document.getElementById('navTrigger');
            const menu = document.getElementById('navMenu');
            const overlay = document.getElementById('navOverlay');
            const closeBtn = document.getElementById('navMenuClose');

            function openMenu() {
                trigger.classList.add('open');
                menu.classList.add('open');
                overlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeMenu() {
                trigger.classList.remove('open');
                menu.classList.remove('open');
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            function toggleMenu() {
                if (menu.classList.contains('open')) closeMenu();
                else openMenu();
            }

            if (trigger) trigger.addEventListener('click', toggleMenu);
            if (overlay) overlay.addEventListener('click', closeMenu);
            if (closeBtn) closeBtn.addEventListener('click', closeMenu);

            const menuLinks = menu.querySelectorAll('ul li a');
            menuLinks.forEach(link => {
                link.addEventListener('click', closeMenu);
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && menu.classList.contains('open')) closeMenu();
            });
        })();
    </script>
</th:block>

</body>
</html>
