<!DOCTYPE html>
<html lang="zh-CN">
<head th:replace="admin/_fragments :: head('分类新增')">
    <title>管理员神秘区域</title>
</head>
<body>
<!--导航-->
<nav class="ui inverted attached segment md-padded-tb-mini md-shadow-mini" th:replace="admin/_fragments :: menu(2)" ></nav>

<!--内容-->
<div class="md-pd-tb-massive">
    <div class="ui container">
        <form action="#" method="post" class="ui form" th:action="*{id}==null ? @{/admin/types} : @{/admin/types/{id}(id=*{id})}" th:object="${type}">
            <input type="hidden" th:field="*{id}" name="id">
            <div class="required field">
                <div class="ui left labeled input">
                    <label class="ui basic label" style="background: white; border: 1px solid #8fa0b8; border-right: none; border-radius: 0; color: #404e5b;">名称</label>
                    <input type="text" name="name" placeholder="分类名称" th:value="*{name}" style="border: 1px solid #8fa0b8; border-radius: 0;">
                </div>
            </div>

            <!--表单错误信息显示-->
            <div class="ui error message"></div>

            <!--/*/
            <div class="ui negative message" th:if="${#fields.hasErrors('name')}" >
                <i class="close icon"></i>
                <div class="header">验证失败</div>
                <p th:errors="*{name}">提交信息不符合规则</p>
            </div>
            /*/-->

            <!--保存返回-->
            <div class="ui right aligned container">
                <button type="button" class="ui button" style="background: white; border: 1px solid #8fa0b8; border-radius: 0; color: #404e5b;" onclick="window.history.go(-1)">返回</button>
                <button class="ui submit button" style="background: #677b8f; border: none; border-radius: 0; color: white;">确定</button>
            </div>
        </form>
    </div>
</div>

<th:block th:replace="admin/_fragments :: script"></th:block>

<script>
    /*做一个适应手机端的导航栏收缩按键*/
    $('.menu.toggle').click(function(){
        $('.md-item').toggleClass('md-mobile-hide');
    });

    /*头像下拉组件*/
    $('.ui.dropdown').dropdown();

    /*表单内容验证*/
    $('.ui.form').form({
        fields : {
            title : {
                identifier:'name',
                rules:[{
                    type : 'empty',
                    prompt:'请输入分类名称'
                }]
            }
        }
    });
</script>

</body>
</html>
