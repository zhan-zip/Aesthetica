<!DOCTYPE html>
<html lang="zh-CN">
<head th:replace="admin/_fragments :: head('后台')">
    <title>管理员神秘区域</title>
</head>
<body>
<!--导航-->
<nav class="ui inverted attached segment md-padded-tb-mini md-shadow-mini" th:replace="admin/_fragments :: menu(2)">
</nav>

<!--内容-->
<div class="md-pd-tb-massive">
    <div class="ui container">

        <div class="ui success message" th:unless="${#strings.isEmpty(message)}">
            <i class="close icon"></i>
            <div class="header">提示</div>
            <p th:text="${message}">操作成功</p>
        </div>

        <!--表格-->
        <table class="ui table">
            <thead>
            <tr>
                <th></th>
                <th>名称</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="type,iterStat : ${page.content}">
                <td th:text="${iterStat.count}">1</td>
                <td th:text="${type.name}">133</td>
                <td>
                    <a href="#" class="ui button" style="background: #677b8f; border: none; border-radius: 0; color: white; margin-right: 4px;" th:href="@{/admin/types/{id}/input(id=${type.id})}">编辑</a>
                    <a href="#" class="ui button" style="background: #8fa0b8; border: none; border-radius: 0; color: white;" th:href="@{/admin/types/{id}/delete(id=${type.id})}">删除</a>
                </td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <th colspan="6">
                    <div class="ui pagination menu" style="border: none;">
                        <a class="item" style="background: white; border: 1px solid #8fa0b8; border-radius: 0; color: #404e5b; margin-right: 4px;" th:href="@{/admin/types(page=${page.number}-1)}">上一页</a>
                        <a class="item" style="background: white; border: 1px solid #8fa0b8; border-radius: 0; color: #404e5b;" th:href="@{/admin/types(page=${page.number}+1)}">下一页</a>
                    </div>
                    <a href="#" class="ui right floated button" style="background: #677b8f; border: none; border-radius: 0; color: white;" th:href="@{/admin/types/input}">新增</a>
                </th>
            </tr>
            </tfoot>
        </table>
    </div>
</div>

<th:block th:replace="admin/_fragments :: script"></th:block>

<script>
    /*做一个适应手机端的导航栏收缩按键*/
    $('.menu.toggle').click(function(){
        $('.md-item').toggleClass('md-mobile-hide');
    });

    /*头像下拉组件*/
    $('.ui.dropdown').dropdown();

    /*关闭消息提示*/
    $('.message .close')
        .on('click',function () {
            $(this)
                .closest('.message')
                .transition('fade');
        });
</script>

</body>
</html>
