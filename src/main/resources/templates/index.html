<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 | Aesthetica</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        // 以下由AI辅助生成：DeepSeek-网页版, 2026-4-15
       /* ========= 所有样式保持不变 ========= */
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       :root {
           --primary: #404e5b;
           --gray-brown: #948f8c;
           --light-blue-gray: #8fa0b8;
           --accent-blue: #5a7d9a;
           --bg-color: #F0F4F8;
           --text-main: #4e5e6b;
           --text-secondary: #6c7c8c;
           --card-bg: #ffffff;
           --shadow: rgba(148, 143, 140, 0.15);
       }

       body {
    background:url('../images/background-3.jpg') no-repeat fixed center;
    font-family: 'Inter', 'Source Han Sans SC', '思源黑体', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-main);
    line-height: 1.6;
    padding: 3rem 1rem 3rem 0;
    padding-top: 5rem;       /* 恢复顶部空间 */
    display: flex !important;
    flex-direction: column !important;
    min-height: 100vh !important;
    margin: 0 !important;
}



       h1, h2, h3, h4, .serif {
           font-family: 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', Georgia, serif;
           font-weight: 400;
       }

       /* ========= 右上角方块导航 ========= */
       .corner-nav {
           position: fixed;
           top: 24px;
           right: 24px;
           z-index: 2000;
       }

       .nav-trigger {
           width: 52px;
           height: 52px;
           background-color: #8fa0b8;
           border-radius: 0;
           cursor: pointer;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           gap: 6px;
           transition: all 0.3s ease;
           box-shadow: 0 4px 12px var(--shadow);
       }

       .nav-trigger:hover {
           background-color:#677b8f;
           transform: scale(1.02);
       }

       .nav-trigger span {
           width: 24px;
           height: 2px;
           background-color: #fff;
           transition: all 0.3s ease;
       }

       .nav-trigger.open span:nth-child(1) {
           transform: rotate(45deg) translate(6px, 6px);
       }

       .nav-trigger.open span:nth-child(2) {
           opacity: 0;
       }

       .nav-trigger.open span:nth-child(3) {
           transform: rotate(-45deg) translate(6px, -6px);
       }

       /* ========= 弹出菜单 ========= */
       .nav-menu {
           position: fixed;
           top: 0;
           right: 0;
           width: 25%;
           height: 100vh;
           background-color: var(--card-bg);
           box-shadow: -4px 0 24px var(--shadow);
           overflow-y: auto;
           transform: translateX(100%);
           transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
           z-index: 2001;
       }

       .nav-menu.open {
           transform: translateX(0);
       }

       .nav-menu ul {
           list-style: none;
           padding: 2rem 0;
       }

       .nav-menu li a {
           display: block;
           padding: 1rem 2rem;
           text-decoration: none;
           color: var(--primary);
           font-size: 1rem;
           letter-spacing: 2px;
           transition: all 0.2s;
           border-bottom: 1px solid var(--gray-brown);
           text-align: left;
       }

       .nav-menu li:first-child a {
           border-top: 1px solid var(--gray-brown);
       }

       .nav-menu li a:hover {
           background-color: rgba(143, 160, 184, 0.15);
           color: var(--accent-blue);
           padding-left: 2.5rem;
       }

       .nav-menu-close {
           position: absolute;
           top: 20px;
           right: 20px;
           width: 36px;
           height: 36px;
           background-color: transparent;
           border: none;
           font-size: 1.5rem;
           cursor: pointer;
           color: var(--text-secondary);
           transition: all 0.2s;
           display: flex;
           align-items: center;
           justify-content: center;
       }

       .nav-menu-close:hover {
           color: var(--primary);
           transform: rotate(90deg);
       }

       .nav-overlay {
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background-color: rgba(0,0,0,0.3);
           backdrop-filter: blur(2px);
           z-index: 1999;
           opacity: 0;
           visibility: hidden;
           transition: all 0.3s ease;
       }

       .nav-overlay.open {
           opacity: 1;
           visibility: visible;
       }

       /* ========= 左侧上下轮播图样式 ========= */
       .left-roll {
           height: 800px;
           position: relative;
           overflow: hidden;
       }

       .carousel-container-vertical {
           position: relative;
           width: 100%;
           height: 100%;
       }

       .carousel-item-vertical {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    visibility: hidden;
}
/* 新增：让内部图片容器填满整个区域 */
.carousel-item-vertical > a,
.carousel-item-vertical > a > div {
    width: 100%;
    height: 100%;
}

       .carousel-item-vertical.active {
           opacity: 1;
           visibility: visible;
       }

       .carousel-title-vertical {
           position: absolute;
           top: 2rem;
           left: 2rem;
           writing-mode: vertical-lr;
           text-orientation: upright;
           font-size: 2.5rem;
           font-weight: 800;
           letter-spacing: 0;
           color: #404e5b;
           line-height: 1.2;
           font-family: 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', Georgia, serif;
           text-shadow:
        -1px -1px 0 #ffffff,
        1px -1px 0 #ffffff,
        -1px 1px 0 #ffffff,
        1px 1px 0 #ffffff,
        0 0 2px #ffffff;
       }

       .carousel-subtitle-vertical {
    position: absolute;
    top: 2rem;
    right: 1rem;               /* 调整距离右边界的距离 */
    writing-mode: vertical-lr;
    text-orientation: mixed;   /* 让文字正常显示（不旋转） */
    font-size: 1.0rem;
    color: #404e5b;
    letter-spacing: 0;
    line-height: 1.5;
    font-family: 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', Georgia, serif;
    max-width: 2rem;           /* 限制最大宽度，避免撑开 */
    z-index: 2;
    text-shadow:
        -1px -1px 0 rgba(255, 255, 255, 0.5),
        1px -1px 0 rgba(255, 255, 255, 0.5),
        -1px 1px 0 rgba(255, 255, 255, 0.5),
        1px 1px 0 rgba(255, 255, 255, 0.5);
}

       .carousel-number {
           position: absolute;
           bottom: 2rem;
           left: 50%;
           transform: translateX(-50%);
           font-size: 5rem;
           font-weight: 300;
           color: var(--gray-brown);
           line-height: 1;
       }

       .carousel-prev,
       .carousel-next {
           position: absolute;
           left: 50%;
           transform: translateX(-50%);
           width: 48px;
           height: 48px;
           background-color: rgba(255, 255, 255, 0.3);
           border: none;
           cursor: pointer;
           font-size: 1.5rem;
           color: var(--primary);
           transition: all 0.3s ease;
           display: flex;
           align-items: center;
           justify-content: center;
           z-index: 10;
       }

       .carousel-prev:hover,
       .carousel-next:hover {
           background-color: rgba(255, 255, 255, 0.5);
       }

       .carousel-prev {
           top: 20px;
       }

       .carousel-next {
           bottom: 20px;
       }

       .four.wide.column {
           margin-left: -2rem;
       }

       .twelve.wide.column {
           padding-left: 4rem !important;
       }

       .intro-box {
           background-color: rgba(255, 255, 255, 0.88);
           padding: 3rem 3rem;
           box-shadow: 0 4px 12px var(--shadow);
           margin-bottom: 0.6rem;
       }

       .intro-box h1 {
           font-size: 2.8rem;
           font-weight: 600;
           letter-spacing: 4px;
           color: var(--primary);
           margin-bottom: 1rem;
           text-align: left;
       }

       .intro-box p {
           color: var(--text-secondary);
           font-size: 1.2rem;
           font-weight: 400;
           line-height: 1.4;
       }

       /* 关于网站框 - 与介绍框样式一致 */
.about-box {
    background-color: rgba(255, 255, 255, 0.9);
    padding: 0.5rem 3rem;
    box-shadow: 0 4px 12px var(--shadow);
    margin-bottom: 5rem;
}
.about-box h2 {
    font-size: 1.7rem;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--primary);
    margin-bottom: 0.5rem;
    text-align: left;
}
.about-box p {
    color: var(--text-secondary);
    font-size: 1rem;
    line-height: 1.2;
    margin-bottom: 0.5rem;
}

       .featured-box {
           flex: 1;
           background-color: var(--card-bg);
           padding: 2rem 2rem 1rem 2rem;
           box-shadow: 0 4px 12px var(--shadow);
       }

       .categories-box {
           flex: 1;
           background-color: var(--card-bg);
           padding: 2rem 2rem 1rem 2rem;
           box-shadow: 0 4px 12px var(--shadow);
       }

       .section-label {
           font-size: 1rem;
           font-weight: 600;
           color: var(--primary);
           letter-spacing: 2px;
           margin-bottom: 0.5rem;
       }

       .footer {
           text-align: center;
           padding: 20px;
           color: var(--text-secondary);
           font-size: 14px;
           border-top: 1px solid var(--gray-brown);
           margin-top: 40px;
       }

       .featured-item {
           display: flex;
           justify-content: space-between;
           align-items: center;
           padding: 0.7rem 0;
           border-bottom: 1px solid var(--gray-brown);
       }

       .featured-item:last-child {
           border-bottom: none;
       }

       .featured-item a {
           color: var(--text-main);
           text-decoration: none;
           font-size: 1.1rem;
       }

       .featured-item a:hover {
           color: var(--accent-blue);
       }

       .featured-category {
           font-size: 0.7rem;
           color: var(--text-secondary);
           background-color: rgba(143, 160, 184, 0.15);
           padding: 0.4rem 0.4rem;
       }

       .category-list {
           display: flex;
           flex-direction: column;
       }

       .category-item {
           display: flex;
           justify-content: space-between;
           align-items: center;
           padding: 0.8rem 0;
           border-bottom: 1px solid var(--gray-brown);
       }

       .category-item:last-child {
           border-bottom: none;
       }

       .category-item a {
           color: var(--text-main);
           text-decoration: none;
           font-size: 1.1rem;
       }

       .category-item a:hover {
           color: var(--accent-blue);
       }

       .category-count {
           font-size: 1rem;
           color: var(--text-secondary);
           background-color: rgba(143, 160, 184, 0.15);
           padding: 0.2rem 0.6rem;
       }

       @media (max-width: 1000px) {
           .left-roll {
               height: 400px;
           }
           .nav-menu {
               width: 60%;
           }
           .twelve.wide.column {
               padding-left: 1rem !important;
           }
           .four.wide.column {
               margin-left: 0;
           }
       }

       @media (max-width: 600px) {
           .corner-nav {
               top: 16px;
               right: 16px;
           }
           .nav-trigger {
               width: 44px;
               height: 44px;
           }
           .nav-menu {
               width: 80%;
           }
       }
    </style>
</head>
<body>

<!-- ========= 右上角导航 ========= -->
<div class="corner-nav">
    <div class="nav-trigger" id="navTrigger">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<div class="nav-menu" id="navMenu">
    <button class="nav-menu-close" id="navMenuClose">✕</button>
    <ul>
        <li><a href="/" th:href="@{/}">首页</a></li>
        <li><a href="/bobbin" th:href="@{/bobbin}">知识线轴</a></li>
        <li><a href="/admin" th:href="@{/admin}">后台</a></li>
        <li><a href="/about" th:href="@{/about}">关于网站</a></li>
    </ul>
</div>
<div class="nav-overlay" id="navOverlay"></div>

<!-- ========= 主要内容 ========= -->
<div class="ui container">
    <div class="ui grid">
        <!-- 左侧轮播图（动态绑定最新10篇文章） -->
        <div class="four wide column">
            <div class="left-roll" id="verticalCarousel">
                <div class="carousel-container-vertical">
                    <div th:each="blog, iterStat : ${latestBlogs}" class="carousel-item-vertical" th:classappend="${iterStat.first} ? 'active'">
                        <a th:href="@{/blog/{id}(id=${blog.id})}" style="display: block; width: 100%; height: 100%; position: relative; text-decoration: none;">
                            <!-- 背景图：占满整个框，居中裁剪，z-index 设为 0 放在最底层 -->
                            <div th:style="'background-image: url(' + (${blog.firstPicture} != null ? @{${blog.firstPicture}} : '/images/back.jpg') + '); background-size: cover; background-position: center; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0;'"></div>
                            <!-- 左上角标题（竖向） -->
                            <div class="carousel-title-vertical" th:text="${blog.title}">标题</div>
                            <!-- 右上角简介（竖向） -->
                            <div class="carousel-subtitle-vertical" th:text="${#strings.abbreviate(blog.content, 50)}">简介</div>
                        </a>
                    </div>
                </div>
                <button class="carousel-prev" id="carouselPrev">←</button>
                <button class="carousel-next" id="carouselNext">→</button>
            </div>
        </div>

        <!-- 右侧内容 -->
        <div class="twelve wide column">
            <div class="ui grid" style="height: 100%;">
                <!-- 介绍框（静态） -->
                <div class="sixteen wide column">
                    <div class="intro-box">
                        <h1>美哉·美哉——美学知识科普平台</h1>
                        <p>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;致力于构建一个去门槛、去量化的美学知识角落，让美学变得可感可知。</p>
                    </div>
                </div>

                <!-- 关于网站框（静态） -->
                <div class="sixteen wide column">
                    <div class="about-box">
                        <h2>美学学科的诞生</h2>
                        <p>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Aesthetica，意为感性学，即美学，该词由德国理性主义哲学家鲍姆嘉通发明，1750年同名著作的发表代表着美学学科的建立。自此，美学作为一个独立学科被人们所研究。</p>
                    </div>
                </div>

                <!-- 推荐内容 + 分类区域（动态数据） -->
                <div class="row" style="margin-top: auto;">
                    <div class="sixteen wide column">
                        <div style="display: flex; gap: 2rem;">
                            <!-- 推荐内容区域 -->
                            <div style="flex: 1;">
                                <div class="featured-box">
                                    <div class="section-label">或许你会感兴趣</div>
                                    <div style="border-top: 1px solid var(--gray-brown); margin: 0.5rem 0 1rem 0;"></div>
                                    <div class="featured-list">
                                        <div th:each="blog : ${recommendBlogs}" class="featured-item">
                                            <a th:href="@{/blog/{id}(id=${blog.id})}" th:text="${blog.title}">文章标题</a>
                                            <span class="featured-category" th:text="${blog.type.name}">分类</span>
                                        </div>
                                        <!-- 如果推荐内容为空，显示占位提示 -->
                                        <div th:if="${#lists.isEmpty(recommendBlogs)}" class="featured-item">
                                            <span>暂无推荐内容</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 分类区域 -->
                            <div style="flex: 1;">
                                <div class="categories-box">
                                    <div class="section-label">分类</div>
                                    <div style="border-top: 1px solid var(--gray-brown); margin: 0.5rem 0 1rem 0;"></div>
                                    <div class="category-list">
                                        <div th:each="type : ${types}" class="category-item">
                                            <a th:href="@{/bobbin(type=${type.name})}" th:text="${type.name}">分类名称</a>
                                            <span class="category-count" th:text="${type.blogs.size()} + '篇'">0篇</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 上下轮播图逻辑（保持不变）
    (function() {
        const items = document.querySelectorAll('.carousel-item-vertical');
        const prevBtn = document.getElementById('carouselPrev');
        const nextBtn = document.getElementById('carouselNext');
        let currentIndex = 0;
        const totalItems = items.length;

        function showItem(index) {
            items.forEach((item, i) => {
                if (i === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function nextItem() {
            currentIndex = (currentIndex + 1) % totalItems;
            showItem(currentIndex);
        }

        function prevItem() {
            currentIndex = (currentIndex - 1 + totalItems) % totalItems;
            showItem(currentIndex);
        }

        if (prevBtn) prevBtn.addEventListener('click', prevItem);
        if (nextBtn) nextBtn.addEventListener('click', nextItem);
    })();

    // 导航交互（保持不变）
    (function() {
        const trigger = document.getElementById('navTrigger');
        const menu = document.getElementById('navMenu');
        const overlay = document.getElementById('navOverlay');
        const closeBtn = document.getElementById('navMenuClose');

        function openMenu() {
            trigger.classList.add('open');
            menu.classList.add('open');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            trigger.classList.remove('open');
            menu.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        function toggleMenu() {
            if (menu.classList.contains('open')) closeMenu();
            else openMenu();
        }

        trigger.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', closeMenu);
        if (closeBtn) closeBtn.addEventListener('click', closeMenu);

        const menuLinks = menu.querySelectorAll('ul li a');
        menuLinks.forEach(link => link.addEventListener('click', closeMenu));

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && menu.classList.contains('open')) closeMenu();
        });
    })();
</script>
</body>
</html>
