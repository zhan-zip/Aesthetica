<!DOCTYPE html>
<html lang="zh-CN">
<head th:replace="admin/_fragments :: head('后台')">
    <title>管理员神秘区域</title>
</head>
<body>
<!--导航-->
<nav class="ui inverted attached segment md-padded-tb-mini md-shadow-mini" th:replace="admin/_fragments :: menu(3)" ></nav>


    <!--内容-->
    <div class="md-pd-tb-massive">
        <div class="ui container">
            <form action="#" method="post" class="ui form" th:action="@{/admin/blogs}" id="blog-form" th:object="${blog}" enctype="multipart/form-data">
                <input type="hidden" name="published">
                <input type="hidden" name="id" th:value="*{id}">
                <!--标题栏-->
                <div class="required field">
                    <input type="text" name="title" placeholder="标题" th:value="*{title}">
                </div>
                <!--内容-->
                <div style="background-color: rgba(255,255,255,0.9); border-radius: 12px; padding: 2.5em 2em; box-shadow: 0 8px 16px rgba(0,0,0,0.1);">     <!-以下为AI辅助修改源代码：DeepSeek, 2026-3->
                    <div class="required field">
                        <div id="md-content" style="z-index: 1 !important;">
                            <textarea placeholder="输入内容" name="content" style="display: none;" th:text="*{content}">
[TOC]

#### Disabled options

- TeX (Based on KaTeX);
- Emoji;
- Task lists;
- HTML tags decode;
- Flowchart and Sequence Diagram;

                            </textarea>
                        </div>
                    </div>
                </div>
                <!--底部tag选择-->
                <div class="required field">

                        <div class="ui left labeled input">
                            <label class="ui action compact teal basic label">分类</label>
                            <div class="ui fluid selection dropdown">
                                <input type="hidden" name="type.id" th:value="*{type.id}">
                                <i class="dropdown icon"></i>
                                <div class="default text">分类</div>
                                <div class="menu">
                                    <div class="item" data-value="1" th:each="types : ${types}" th:data-value="${types.id}" th:text="${types.name}">开发者手册</div>
                                </div>
                            </div>
                        </div>
                </div>
                <!-ai辅助4-16->
                <div class="required field">
                    <div class="ui left labeled input">
                        <label class="ui teal basic label">首图</label>
                        <input type="text" name="firstPicture" placeholder="首图地址" th:value="*{firstPicture}" id="firstPictureInput">
                        <button type="button" id="uploadImageBtn" class="ui button">上传图片</button>
                    </div>
                    <input type="file" id="imageFile" style="display: none;" accept="image/jpeg,image/png,image/gif,image/webp">
                    <div id="uploadProgress" style="display: none; color: green;">上传中...</div>
                </div>
                <!--表单错误信息显示-->
                <div class="ui error message"></div>

                <!--保存返回-->
                <div class="ui right aligned container">
                    <button type="button" class="ui button" onclick="window.history.go(-1)">返回</button>
                    <button type="button" id="save-button" class="ui orange button">保存</button>
                    <button type="button" id="publish-button" class="ui teal button">发布</button>
                </div>
            </form>
        </div>
    </div>

<th:block th:replace="admin/_fragments :: script"></th:block>

<!--底下这串我看不懂，做互动的-->
    <script>
        /*初始化markdown*/
        var contentEditor;
            $(function() {
                contentEditor= editormd("md-content", {
                    width   : "100%",
                    height  : 640,
                    syncScrolling : "single",
                    path    : "/lib/editormd/lib/"
                });
            });

            // 图片上传功能
$('#uploadImageBtn').click(function() {
    $('#imageFile').click();
});
$('#imageFile').change(function() {
    var file = this.files[0];
    if (!file) return;
    var formData = new FormData();
    formData.append('file', file);
    $('#uploadProgress').show();
    $.ajax({
        url: '/upload/image',
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        success: function(response) {
            $('#uploadProgress').hide();
            if (response.url) {
                $('#firstPictureInput').val(response.url);
                alert('上传成功');
            } else if (response.error) {
                alert(response.error);
            }
        },
        error: function(xhr) {
            $('#uploadProgress').hide();
            alert('上传失败：' + (xhr.responseJSON?.error || '服务器错误'));
        }
    });
});

        /*做一个适应手机端的导航栏收缩按键*/
        $('.menu.toggle').click(function(){
            $('.md-item').toggleClass('md-mobile-hide');
        });

        /*头像下拉组件*/
        $('.ui.dropdown').dropdown();

        /*表单内容验证*/
        $('.ui.form').form({
            fields : {
                title : {
                    identifier:'title',
                    rules:[{
                        type : 'empty',
                        prompt:'请输入标题'
                    }]
                },
                content : {
                    identifier:'content',
                    rules:[{
                        type : 'empty',
                        prompt:'请输入内容'
                    }]
                },
                typeId : {
                    identifier:'type.id',
                    rules:[{
                        type : 'empty',
                        prompt:'请输入分类名称'
                    }]
                },
            }
        });

        /*保存*/
        $('#save-button').click(function () {
            $('[name="published"]').val(false);
            $('#blog-form').submit();
        });

        /*发布*/
        $('#publish-button').click(function () {
            $('[name="published"]').val(true);
            $('#blog-form').submit();
        });

    </script>


</body>
</html>
