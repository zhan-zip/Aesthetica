<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归档线轴 | Aesthetica</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>   // 以下由AI辅助生成：DeepSeek-网页版, 2026-4-15
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --primary: #404e5b;
        --gray-brown: #948f8c;
        --light-blue-gray: #8fa0b8;
        --accent-blue: #5a7d9a;
        --bg-color: rgba(148, 143, 140, 0.1);
        --text-main: #4e5e6b;
        --text-secondary: #6c7c8c;
        --card-bg: #ffffff;
        --shadow: rgba(148, 143, 140, 0.15);
    }

    body {
        background-color: var(--bg-color);
        font-family: 'Inter', 'Source Han Sans SC', sans-serif;
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        margin: 0;
        padding: 2rem;
        transition: background-image 1.0s ease-out, background-color 0.8s ease;
}
    }

    h1, h2, h3, h4, .serif {
        font-family: 'Noto Serif SC', 'Source Han Serif SC', serif;
        font-weight: 400;
    }

    /* ========= 右上角方块导航 ========= */
.corner-nav {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 2000;
}

.nav-trigger {
    width: 52px;
    height: 52px;
    background-color: #8fa0b8;
    border-radius: 0;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px var(--shadow);
}

.nav-trigger:hover {
    background-color: #677b8f;
    transform: scale(1.02);
}

.nav-trigger span {
    width: 24px;
    height: 2px;
    background-color: #fff;
    transition: all 0.3s ease;
}

.nav-trigger.open span:nth-child(1) {
    transform: rotate(45deg) translate(6px, 6px);
}

.nav-trigger.open span:nth-child(2) {
    opacity: 0;
}

.nav-trigger.open span:nth-child(3) {
    transform: rotate(-45deg) translate(6px, -6px);
}

/* ========= 弹出菜单 ========= */
.nav-menu {
    position: fixed;
    top: 0;
    right: 0;
    width: 25%;
    height: 100vh;
    background-color: var(--card-bg);
    box-shadow: -4px 0 24px var(--shadow);
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    z-index: 2001;
}

.nav-menu.open {
    transform: translateX(0);
}

.nav-menu ul {
    list-style: none;
    padding: 2rem 0;
}

.nav-menu li a {
    display: block;
    padding: 1rem 2rem;
    text-decoration: none;
    color: var(--primary);
    font-size: 1rem;
    letter-spacing: 2px;
    transition: all 0.2s;
    border-bottom: 1px solid var(--gray-brown);
    text-align: left;
}

.nav-menu li:first-child a {
    border-top: 1px solid var(--gray-brown);
}

.nav-menu li a:hover {
    background-color: rgba(143, 160, 184, 0.15);
    color: var(--accent-blue);
    padding-left: 2.5rem;
}

.nav-menu-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 36px;
    height: 36px;
    background-color: transparent;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.nav-menu-close:hover {
    color: var(--primary);
    transform: rotate(90deg);
}

.nav-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.3);
    backdrop-filter: blur(2px);
    z-index: 1999;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
}

.nav-overlay.open {
    opacity: 1;
    visibility: visible;
}

    .timeline-zoom {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        transform-origin: center center;
    }

    .timeline {
        position: relative;
        width: 100%;
        padding: 5rem 0;
    }

    .axis {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 4px;
        background-color: #404e5b;
        transform: translateY(-50%);
        z-index: 1;
    }

    .nodes {
        position: relative;
        width: 100%;
        min-height: 300px;
    }

    .node {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        z-index: 10;
        top: 50%;
        transform-origin: center center;
        transition: transform 0.2s;
    }

    .node-dot {
        width: 12px;
        height: 12px;
        background-color: var(--light-blue-gray);
        border-radius: 50%;
        transition: all 0.2s ease;
        position: relative;
        z-index: 3;
    }

    .node-line {
        position: absolute;
        width: 2px;
        background-color: #404e5b;
        left: 50%;
        transform: translateX(-50%);
        transition: all 0.2s ease;
        z-index: 1;
    }

    .node.above .node-line {
        top: 6px;
        height: 0;
    }
    .node.below .node-line {
        bottom: 6px;
        height: 0;
    }

    .node-info {
position: absolute;
white-space: nowrap;
font-family: 'Noto Serif SC', 'Source Han Serif SC', serif;
font-weight: 400;
font-size: 1.6rem;
color: var(--text-secondary);
transition: color 0.2s;
writing-mode: vertical-lr;
text-orientation: upright;
left: 30px;
top: 50%;
transform: translateY(-50%);
}

    .node-count {
        font-size: 0.9rem;
        color: var(--gray-brown);
        margin-top: 8px;
    }

    .node:hover .node-dot {
        background-color: var(--accent-blue);
        transform: scale(1.4);
        box-shadow: 0 0 0 3px rgba(90, 125, 154, 0.3);
    }
    .node:hover .node-info {
        color: var(--accent-blue);
    }
    .node:hover .node-line {
        background-color: var(--accent-blue);
    }

    .popup {
        position: fixed;
        background-color: var(--card-bg);
        border: 1px solid var(--gray-brown);
        padding: 1rem;
        min-width: 220px;
        max-width: 280px;
        z-index: 1000;
        box-shadow: 0 4px 12px var(--shadow);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, visibility 0.2s ease;
    }
    .popup.visible {
        opacity: 1;
        visibility: visible;
    }
    .popup h4 {
        font-family: 'Noto Serif SC', serif;
        color: var(--primary);
        margin-bottom: 0.75rem;
        font-size: 1rem;
        font-weight: 500;
    }
    .popup ul {
        list-style: none;
        margin: 0;
    }
    .popup ul li {
        padding: 0.6rem 0;
        border-bottom: 1px solid var(--gray-brown);
    }
    .popup ul li:last-child {
        border-bottom: none;
    }
    .popup ul li a {
        text-decoration: none;
        color: var(--text-main);
        font-size: 0.85rem;
        display: block;
        transition: color 0.2s;
        font-family: 'Inter', sans-serif;
    }
    .popup ul li a:hover {
        color: var(--accent-blue);
    }

    .nav-switch {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        width: 48px;
        height: 48px;
        background-color: rgba(255, 255, 255, 0.5);
        border: none;
        cursor: pointer;
        font-size: 1.5rem;
        color: var(--primary);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1500;
        opacity: 0;
        visibility: hidden;
    }
    .nav-switch.visible {
        opacity: 1;
        visibility: visible;
    }
    .nav-switch:hover {
        background-color: rgba(255, 255, 255, 0.7);
        color: var(--accent-blue);
    }
    .nav-switch.disabled {
        opacity: 0.2;
        pointer-events: none;
    }
    .nav-prev {
        left: 20px;
    }
    .nav-next {
        right: 20px;
    }
  </style>
</head>
<body>

<!-- ========= 右上角导航 ========= -->
<div class="corner-nav">
  <div class="nav-trigger" id="navTrigger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<div class="nav-menu" id="navMenu">
  <button class="nav-menu-close" id="navMenuClose">✕</button>
  <ul>
    <li><a href="/" th:href="@{/}">首页</a></li>
    <li><a href="/bobbin" th:href="@{/bobbin}">归档线轴</a></li>
    <li><a href="/admin" th:href="@{/admin}">后台</a></li>
    <li><a href="#">关于网站</a></li>
  </ul>
</div>
<div class="nav-overlay" id="navOverlay"></div>
<div class="timeline-zoom" id="timelineZoom">
  <div class="timeline">
    <div class="axis"></div>
    <div class="nodes" id="nodesContainer"></div>
  </div>
</div>

<div class="popup" id="popup">
  <h4 id="popupTitle"></h4>
  <ul id="popupList"></ul>
</div>

<button class="nav-switch nav-prev" id="navPrev">←</button>
<button class="nav-switch nav-next" id="navNext">→</button>

<script th:inline="javascript">
  // 固定6个分类
const categories = [
    { name: "导论", count: 0, articles: [] },
    { name: "活动论", count: 0, articles: [] },
    { name: "形态论", count: 0, articles: [] },
    { name: "经验论", count: 0, articles: [] },
    { name: "艺术论", count: 0, articles: [] },
    { name: "教育论", count: 0, articles: [] }
];

// 从后端获取数据并填充
const categoryData = /*[[${categoryData}]]*/ {};
for (let i = 0; i < categories.length; i++) {
    const name = categories[i].name;
    if (categoryData[name]) {
        categories[i].count = categoryData[name].count;
        categories[i].articles = categoryData[name].articles;
    }
}

  // 导航交互
(function() {
    const trigger = document.getElementById('navTrigger');
    const menu = document.getElementById('navMenu');
    const overlay = document.getElementById('navOverlay');
    const closeBtn = document.getElementById('navMenuClose');

    function openMenu() {
        trigger.classList.add('open');
        menu.classList.add('open');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
        trigger.classList.remove('open');
        menu.classList.remove('open');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
    }

    function toggleMenu() {
        if (menu.classList.contains('open')) {
            closeMenu();
        } else {
            openMenu();
        }
    }

    if (trigger) trigger.addEventListener('click', toggleMenu);
    if (overlay) overlay.addEventListener('click', closeMenu);
    if (closeBtn) closeBtn.addEventListener('click', closeMenu);

    const menuLinks = menu.querySelectorAll('ul li a');
    menuLinks.forEach(link => {
        link.addEventListener('click', closeMenu);
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && menu.classList.contains('open')) {
            closeMenu();
        }
    });
})();


  const BASE_OFFSET = 80;   //基础连接线长度
  const UNIT = 40;    //一篇文章增加的值
  const ZOOM_SCALE = 2.1;
  const POPUP_WIDTH = 240;
  const SIDE_MARGIN_PERCENT = 5;

  const nodesContainer = document.getElementById('nodesContainer');
  const timelineZoom = document.getElementById('timelineZoom');
  const popup = document.getElementById('popup');
  const popupTitle = document.getElementById('popupTitle');
  const popupList = document.getElementById('popupList');
  const navPrev = document.getElementById('navPrev');
  const navNext = document.getElementById('navNext');

  let currentZoomedNode = null;
  let isZoomed = false;
  let isAnimating = false;

  function getNodeOffset(count) {
      return BASE_OFFSET + count * UNIT;
  }

  function buildNodes() {
      const nodeCount = categories.length;
      const start = SIDE_MARGIN_PERCENT;
      const end = 100 - SIDE_MARGIN_PERCENT;
      const step = (end - start) / (nodeCount - 1);

      categories.forEach((cat, idx) => {
          const offset = getNodeOffset(cat.count);
          const nodeDiv = document.createElement('div');
          nodeDiv.className = 'node';
          const centerPercent = start + idx * step;
          nodeDiv.style.left = `${centerPercent}%`;
          let translateY;
          if (idx % 2 === 0) {
              nodeDiv.classList.add('above');
              translateY = -offset;
          } else {
              nodeDiv.classList.add('below');
              translateY = offset;
          }
          nodeDiv.style.transform = `translateX(-50%) translateY(${translateY}px)`;

          const dot = document.createElement('div');
          dot.className = 'node-dot';
          const line = document.createElement('div');
          line.className = 'node-line';
          const lineHeight = offset - 6;
          line.style.height = `${lineHeight}px`;
          const info = document.createElement('div');
          info.className = 'node-info';
          info.innerHTML = `${cat.name}<div class="node-count">${cat.count}篇</div>`;

          nodeDiv.appendChild(dot);
          nodeDiv.appendChild(line);
          nodeDiv.appendChild(info);

          nodeDiv.dataset.name = cat.name;
          nodeDiv.dataset.articles = JSON.stringify(cat.articles);
          nodeDiv.dataset.count = cat.count;
          nodeDiv.dataset.index = idx;

          nodeDiv.addEventListener('click', (e) => {
              e.stopPropagation();
              zoomToNode(nodeDiv, cat);
          });

          nodesContainer.appendChild(nodeDiv);
      });
  }

  function hidePopup() {
      popup.classList.remove('visible');
  }

  function showPopup(node, cat) {
      const rect = node.getBoundingClientRect();
      let left, top;
      // 获取节点索引
    const nodeIndex = parseInt(node.dataset.index);

    // 第一个节点（导论）特殊处理：显示在右侧
    if (nodeIndex === 0) {
        const rightSpace = window.innerWidth - rect.right;
        if (rightSpace < POPUP_WIDTH + 20) {
            left = rect.left - POPUP_WIDTH - 12;
        } else {
            left = rect.right + 170;
        }
    } else {
        // 其他节点显示在左侧
        left = rect.left - POPUP_WIDTH - 35;
        if (left < 10) left = 10;
    }
      top = rect.top;
      if (top + 200 > window.innerHeight) top = window.innerHeight - 210;
      if (top < 10) top = 10;
      popup.style.left = `${left}px`;
      popup.style.top = `${top}px`;
      popupTitle.textContent = cat.name;
      popupList.innerHTML = cat.articles.map(a => `<li><a href="/blog/${a.id}" data-image="${a.firstPicture || ''}">${a.title}</a></li>`).join('');
      popup.offsetHeight;
      popup.classList.add('visible');

      // 显示浮层后，绑定悬浮事件
setTimeout(() => {
    const items = popupList.querySelectorAll('li a');
    items.forEach(item => {
        const imgUrl = item.dataset.image;
        if (imgUrl) {
            item.addEventListener('mouseenter', () => {
                document.body.style.backgroundImage = `url(${imgUrl})`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundColor = 'rgba(0,0,0,0.3)';
                document.body.style.backgroundBlendMode = 'overlay';
            });
            item.addEventListener('mouseleave', () => {
                document.body.style.backgroundImage = '';
                document.body.style.backgroundColor = 'var(--bg-color)';
                document.body.style.backgroundBlendMode = 'normal';
            });
        }
    });
}, 50);
  }

  function updateNavButtons() {
      if (!isZoomed) {
          navPrev.classList.remove('visible');
          navNext.classList.remove('visible');
          return;
      }
      navPrev.classList.add('visible');
      navNext.classList.add('visible');
      const currentIndex = parseInt(currentZoomedNode.dataset.index);
      if (currentIndex === 0) {
          navPrev.classList.add('disabled');
      } else {
          navPrev.classList.remove('disabled');
      }
      if (currentIndex === categories.length - 1) {
          navNext.classList.add('disabled');
      } else {
          navNext.classList.remove('disabled');
      }
  }

  // 修正缩放变换：使节点中心精确移动到视口中心
  function applyZoomTransform(node) {
      const rect = node.getBoundingClientRect();
      const nodeCenterX = rect.left + rect.width / 2;
      const nodeCenterY = rect.top + rect.height / 2;
      const viewportCenterX = window.innerWidth / 2;
      const viewportCenterY = window.innerHeight / 2;

      // 计算从当前节点中心到视口中心的偏移量（相对于缩放前的画布）
      const deltaX = viewportCenterX - nodeCenterX;
      const deltaY = viewportCenterY - nodeCenterY;

      // 由于缩放后坐标会变化，实际需要的平移量 = 当前平移量 + (deltaX / ZOOM_SCALE)
      // 获取当前的 transform 矩阵（默认为无）
      let currentTranslateX = 0, currentTranslateY = 0;
      const transform = timelineZoom.style.transform;
      if (transform !== '') {
          const match = transform.match(/translate\(([^,]+),([^)]+)\)/);
          if (match) {
              currentTranslateX = parseFloat(match[1]);
              currentTranslateY = parseFloat(match[2]);
          }
      }

      // 新平移量
      const newTranslateX = currentTranslateX + (deltaX / ZOOM_SCALE);
      const newTranslateY = currentTranslateY + (deltaY / ZOOM_SCALE);

      timelineZoom.style.transform = `scale(${ZOOM_SCALE}) translate(${newTranslateX}px, ${newTranslateY}px)`;
  }

  function zoomToNode(node, cat) {
      if (isAnimating) return;
      if (currentZoomedNode === node && isZoomed) {
          hidePopup();
          showPopup(node, cat);
          return;
      }

      isAnimating = true;
      hidePopup();
      applyZoomTransform(node);

      const onTransitionEnd = () => {
          timelineZoom.removeEventListener('transitionend', onTransitionEnd);
          isZoomed = true;
          currentZoomedNode = node;
          updateNavButtons();
          showPopup(node, cat);
          isAnimating = false;
      };
      timelineZoom.addEventListener('transitionend', onTransitionEnd, { once: true });
      setTimeout(() => {
          if (isAnimating) {
              timelineZoom.removeEventListener('transitionend', onTransitionEnd);
              onTransitionEnd();
          }
      }, 500);
  }

  function resetView() {
      if (isAnimating) return;
      isAnimating = true;
      hidePopup();
      timelineZoom.style.transform = 'scale(1) translate(0, 0)';
      const onResetEnd = () => {
          timelineZoom.removeEventListener('transitionend', onResetEnd);
          isZoomed = false;
          currentZoomedNode = null;
          navPrev.classList.remove('visible');
          navNext.classList.remove('visible');
          isAnimating = false;
      };
      timelineZoom.addEventListener('transitionend', onResetEnd, { once: true });
      setTimeout(() => {
          if (isAnimating) {
              timelineZoom.removeEventListener('transitionend', onResetEnd);
              onResetEnd();
          }
      }, 500);
  }

  function goPrev() {
      if (!isZoomed || isAnimating) return;
      const currentIndex = parseInt(currentZoomedNode.dataset.index);
      if (currentIndex <= 0) return;
      const prevNode = document.querySelector(`.node[data-index='${currentIndex - 1}']`);
      const prevCat = categories[currentIndex - 1];
      if (prevNode) {
          zoomToNode(prevNode, prevCat);
      }
  }

  function goNext() {
      if (!isZoomed || isAnimating) return;
      const currentIndex = parseInt(currentZoomedNode.dataset.index);
      if (currentIndex >= categories.length - 1) return;
      const nextNode = document.querySelector(`.node[data-index='${currentIndex + 1}']`);
      const nextCat = categories[currentIndex + 1];
      if (nextNode) {
          zoomToNode(nextNode, nextCat);
      }
  }

  document.addEventListener('click', (e) => {
      const isNode = e.target.closest('.node');
      const isPopup = e.target.closest('.popup');
      const isNavBtn = e.target.closest('.nav-switch');
      if (!isNode && !isPopup && !isNavBtn && isZoomed && !isAnimating) {
          resetView();
      }
  });

  navPrev.addEventListener('click', goPrev);
  navNext.addEventListener('click', goNext);

  buildNodes();

  //接受参数放大节点
  // 获取 URL 参数中的分类名称
function getUrlParameter(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

// 页面加载完成后，检查是否有指定分类
document.addEventListener('DOMContentLoaded', function() {
    const typeName = getUrlParameter('type');
    if (typeName) {
        // 找到对应的节点
        const targetNode = Array.from(document.querySelectorAll('.node')).find(node => {
            return node.querySelector('.node-info')?.innerText.includes(typeName);
        });
        if (targetNode) {
            // 找到对应的分类数据
            const targetCat = categories.find(cat => cat.name === typeName);
            if (targetCat) {
                // 延迟执行，确保节点已渲染完成
                setTimeout(() => {
                    zoomToNode(targetNode, targetCat);
                }, 100);
            }
        }
    }
});
</script>
</body>
</html>
